<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komi Al - Votre Application</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
      padding: 50px 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1em;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    .btn {
      display: inline-block;
      padding: 15px 30px;
      background: #fff;
      color: #764ba2;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    footer {
      margin-top: 40px;
      font-size: 0.9em;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bienvenue sur Komi Al 🚀</h1>
    <p>Votre application simple, rapide et sécurisée.</p>
    
    <a href="#" class="btn">Commencer</a>
    
    <footer>
      <p>© 2026 Komi Al. Tous droits réservés.</p>
    </footer>
  </div>

  <script>
    document.querySelector('.btn').addEventListener('click', function(e) {
      e.preventDefault();
      alert('Bienvenue sur Komi Al !');
    });
  </script>
</body>
</html>
