<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komi V3.0 - IA Vocale Bilingue</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-color: #1e293b;
    --text-color: #f8fafc;
    --primary-color: #38bdf8;
    --primary-hover: #0ea5e9;
    --accent-color: #ec4899;
  }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 20px;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between; /* Permet de pousser le footer vers le bas */
    min-height: 100vh;
    box-sizing: border-box;
  }
  .chat-container {
    width: 90%;
    max-width: 500px;
    background: var(--card-color);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    margin-top: auto; /* Centre verticalement la boîte de chat */
    margin-bottom: auto;
  }
  h2 { margin-top: 0; color: var(--primary-color); }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 15px;
    font-size: 14px;
    flex-wrap: wrap;
  }
  .controls label { display: flex; flex-direction: column; gap: 5px; }
  select {
    padding: 8px;
    border-radius: 6px;
    background: #0f172a;
    color: white;
    border: 1px solid #334155;
    font-size: 14px;
    cursor: pointer;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
  }
  input {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #fff;
    font-size: 16px;
  }
  input:focus { outline: 2px solid var(--primary-color); }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: var(--primary-color);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  button:hover { background: var(--primary-hover); }
  button.mic-btn { background: var(--accent-color); }
  button.mic-btn.listening { animation: pulse 1.5s infinite; }
  #reponse {
    margin-top: 20px;
    padding: 15px;
    background: #0f172a;
    border-radius: 8px;
    min-height: 50px;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.5;
  }
  footer {
    width: 100%;
    max-width: 600px;
    margin-top: 20px;
    padding: 15px;
    border-top: 1px solid #334155;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
  }
  footer strong { color: var(--primary-color); }
  footer a { color: var(--text-color); text-decoration: none; font-weight: bold; }
  footer a:hover { color: var(--primary-color); }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="chat-container">
  <h2>Komi V3.0 - IA Bilingue</h2>
  
  <!-- Réglages Voix et Langue -->
  <div class="controls">
    <label>Langue: 
      <select id="langue" onchange="changerLangue()">
        <option value="fr">🇫🇷 Français</option>
        <option value="fon">🇧🇯 Fon (Fongbe)</option>
      </select>
    </label>
    <label>Vitesse: <input type="range" id="vitesse" min="0.5" max="2" value="1" step="0.1" style="width:80px; margin:0;"></label>
    <label>Tonalité: <input type="range" id="tonalite" min="0.5" max="2" value="1.1" step="0.1" style="width:80px; margin:0;"></label>
  </div>

  <!-- Saisie et Actions -->
  <div class="input-group">
    <input type="text" id="texte" placeholder="Discuter avec Komi...">
    <button class="mic-btn" id="micBtn" onclick="actionMicro()">🎤</button>
    <button onclick="envoyerMessage()">Envoyer</button>
  </div>

  <!-- Historique / Réponses -->
  <div id="reponse"></div>
  <button onclick="effacerHistorique()" style="background:#475569; font-size:12px; padding:6px 12px; margin-top:10px;">Effacer l'historique</button>
</div>

<!-- Pied de page avec vos informations de contact -->
<footer>
  <strong>Komi V3.0-IA</strong> · Assistance en français et en fon<br>
  © Créé par Fernand AKINOCHO | 
  Téléphone : <a href="tel:+2290196555800">0196555800</a> / <a href="tel:+2290140492743">0140492743</a>
</footer>

<script>
// Clé API OpenAI (À remplacer par votre vraie clé en production sécurisée)
const OPENAI_API_KEY = "VOTRE_CLE_API_OPENAI"; 

let reconnaissance;
let enEcoute = false;

window.onload = function() {
  chargerHistorique();
  configurerReconnaissanceVocale();
  
  // Si le chat est vide, on lance la salutation bilingue
  const historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
  if (historique.length === 0) {
    saluerBilingue();
  }
};

// Salutation simultanée dans les deux langues
function saluerBilingue() {
  const messageTextuel = "Bonjour, je suis Komi, prête à vous aider. / A mǐ nɔ d'agbe, nyǐ kɔ mí. Un ɖo gbesisɔ mɛ bo na dɔn alɔ nu we.";
  ajouterAuChat("Komi", messageTextuel);
  
  // L'IA prononce la phrase bilingue d'un seul coup
  parlerVoix("Bonjour, je suis Komi, prête à vous aider. A mǐ nɔ d'agbe, nyǐ kɔ mí. Un ɖo gbesisɔ mɛ bo na dɔn alɔ nu we.");
}

function changerLangue() {
  configurerReconnaissanceVocale();
}

// 1. Synthèse Vocale
function parlerVoix(texte) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel(); 
    const msg = new SpeechSynthesisUtterance(texte);
    
    msg.lang = "fr-FR"; // Lecture phonétique globale
    msg.rate = parseFloat(document.getElementById("vitesse").value) || 1;
    msg.pitch = parseFloat(document.getElementById("tonalite").value) || 1.1; 
    
    speechSynthesis.speak(msg);
  }
}

// 2. Reconnaissance Vocale (Micro)
function configurerReconnaissanceVocale() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("micBtn").style.display = "none";
    return;
  }
  reconnaissance = new SpeechRecognition();
  
  const langueSaisie = document.getElementById("langue").value;
  reconnaissance.lang = (langueSaisie === "fon") ? "fr-BJ" : "fr-FR"; 
  
  reconnaissance.continuous = false;
  reconnaissance.interimResults = false;

  reconnaissance.onresult = function(event) {
    const texteRecu = event.results[0][0].transcript;
    document.getElementById("texte").value = texteRecu;
    arreterMicro();
    envoyerMessage();
  };

  reconnaissance.onerror = function() { arreterMicro(); };
  reconnaissance.onend = function() { arreterMicro(); };
}

function actionMicro() {
  if (!reconnaissance) return;
  if (!enEcoute) {
    reconnaissance.start();
    enEcoute = true;
    document.getElementById("micBtn").classList.add("listening");
  } else {
    reconnaissance.stop();
  }
}

function arreterMicro() {
  enEcoute = false;
  document.getElementById("micBtn").classList.remove("listening");
}

// 3. Gestion de l'Envoi et Appel API OpenAI
async function envoyerMessage() {
  const champTexte = document.getElementById("texte");
  const messageUtilisateur = champTexte.value.trim();
  if (!messageUtilisateur) return;

  const langueSaisie = document.getElementById("langue").value;

  champTexte.value = "";
  ajouterAuChat("Vous", messageUtilisateur);

  if (OPENAI_API_KEY === "VOTRE_CLE_API_OPENAI") {
    const repSimulation = (langueSaisie === "fon") 
      ? "Mode démo : Sɔ API key we d'o mɛ bo na mɔ gbeta jɔ jɔ." 
      : "Mode démo : Connectez votre clé API OpenAI pour obtenir une vraie réponse.";
    ajouterAuChat("Komi", repSimulation);
    parlerVoix(repSimulation);
    return;
  }

  const texteReflexion = (langueSaisie === "fon") ? "Un ɖo tamɛ dɔn wɛ..." : "En train de réfléchir...";
  ajouterAuChat("Komi", texteReflexion);

  let systemPrompt = "Tu es Komi, une assistante vocale concise et chaleureuse.";
  if (langueSaisie === "fon") {
    systemPrompt = "Tu es Komi, une assistante vocale du Bénin. Tu dois répondre EXCLUSIVEMENT en langue Fon (Fongbe). Fais des phrases courtes, simples et utilise l'alphabet officiel du Fon pour que la lecture phonétique soit compréhensible.";
  }

  try {
    const response = await fetch("https://openai.com", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o-mini", 
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: messageUtilisateur }
        ],
        max_tokens: 150
      })
    });

    const data = await response.json();
    const messageIA = data.choices[0].message.content.trim();
    
    mettreAJourDernierMessage("Komi", messageIA);
    parlerVoix(messageIA);

  } catch (error) {
    const texteErreur = (langueSaisie === "fon") ? "Afɔku ɖe jɛ d'o azɔwanu ɔ mɛ." : "Erreur de connexion à l'IA.";
    mettreAJourDernierMessage("Komi", texteErreur);
  }
}

// 4. Base de données Locale (localStorage)
function ajouterAuChat(auteur, texte) {
  const divReponse = document.getElementById("reponse");
  const p = document.createElement("p");
  p.style.margin = "5px 0";
  p.innerText = `${auteur} : ${texte}`; 
  divReponse.appendChild(p);
  divReponse.scrollTop = divReponse.scrollHeight;

  let historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
  historique.push({ auteur, texte });
  localStorage.setItem("komi_chat", JSON.stringify(historique));
}

function mettreAJourDernierMessage(auteur, texte) {
  const divReponse = document.getElementById("reponse");
  if (divReponse.lastChild) {
    divReponse.lastChild.innerText = `${auteur} : ${texte}`;
    
    let historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
    if(historique.length > 0) {
      historique[historique.length - 1] = { auteur, texte };
