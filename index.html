
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komi V3.0-IA Assistant Africain</title> <!-- CHANGEMENT 1 -->
<style>
  :root {
    --bg-color: #0f172a;
    --card-color: #1e293b;
    --text-color: #f8fafc;
    --primary-color: #FBBD23;
    --primary-hover: #F59E0B;
    --accent-color: #ec4899;
    --whatsapp-color: #25D366;
  }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 20px;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
.chat-container {
    width: 90%;
    max-width: 500px;
    background: var(--card-color);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
.pi-logo {
    width: 70px;
    height: 70px;
    margin: 0 auto 10px auto;
    background: var(--primary-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: bold;
    color: #0f172a;
    box-shadow: 0 4px 15px rgba(251, 189, 35, 0.4);
  }
  h2 { margin: 0; color: var(--primary-color); font-size: 22px; }
.controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 15px 0;
    font-size: 14px;
    flex-wrap: wrap;
  }
.controls label { display: flex; flex-direction: column; gap: 5px; color: #cbd5e1; }
  select {
    padding: 8px;
    border-radius: 6px;
    background: #0f172a;
    color: white;
    border: 1px solid #334155;
    font-size: 14px;
    cursor: pointer;
  }
.input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
  }
  input {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #fff;
    font-size: 16px;
  }
  input:focus { outline: 2px solid var(--primary-color); }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: var(--primary-color);
    color: #0f172a;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  button:hover { background: var(--primary-hover); }
  button.mic-btn { background: var(--accent-color); color: white; }
  button.mic-btn.listening { animation: pulse 1.5s infinite; }
  #reponse {
    margin-top: 20px;
    padding: 15px;
    background: #0f172a;
    border-radius: 8px;
    min-height: 50px;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.5;
  }
  footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.8;
    max-width: 500px;
    border-top: 1px solid #334155;
  }
  footer strong {
    color: var(--primary-color);
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
  }
.whatsapp-link {
    color: var(--whatsapp-color);
    text-decoration: none;
    font-weight: bold;
  }
.whatsapp-link:hover {
    text-decoration: underline;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="pi-logo">π</div>

  <h2>Komi V3.0-IA Assistant Africain</h2> <!-- CHANGEMENT 2 -->

  <div class="controls">
    <label>Langue:
      <select id="langue" onchange="changerLangue()">
        <option value="fr">🇫🇷 Français</option>
        <option value="fon">🇧🇯 Fon (Fongbe)</option>
      </select>
    </label>
    <label>Vitesse: <input type="range" id="vitesse" min="0.5" max="2" value="1" step="0.1" style="width:80px; margin:0;"></label>
    <label>Tonalité: <input type="range" id="tonalite" min="0.5" max="2" value="1.1" step="0.1" style="width:80px; margin:0;"></label>
  </div>

  <div class="input-group">
    <input type="text" id="texte" placeholder="Discuter avec Komi V3.0-IA...">
    <button class="mic-btn" id="micBtn" onclick="actionMicro()">🎤</button>
    <button onclick="envoyerMessage()">Envoyer</button>
  </div>

  <div id="reponse"></div>
  <button onclick="effacerHistorique()" style="background:#475569; color:white; font-size:12px; padding:6px 12px; margin-top:10px;">Effacer l'historique</button>
</div>

<!-- FOOTER -->
<footer>
  <strong>Komi V3.0-IA Assistant Africain</strong> <!-- CHANGEMENT 3 -->
  Assistant en Français et Fon<br>
  © Créé par Fernand AKINOCHO - Cotonou-Bénin<br>
  WhatsApp :
  <a href="https://wa.me/2290196555800" target="_blank" class="whatsapp-link">01 96 55 58 00</a> /
  <a href="https://wa.me/2290140492743" target="_blank" class="whatsapp-link">01 40 49 27 43</a>
</footer>

<script>
const OPENAI_API_KEY = "VOTRE_CLE_API_OPENAI";

let reconnaissance;
let enEcoute = false;

window.onload = function() {
  chargerHistorique();
  configurerReconnaissanceVocale();
  saluer();
};

function saluer() {
  const langue = document.getElementById("langue").value;
  if (langue === "fon") {
    parlerVoix("A mǐ nɔ d'agbe, nyǐ Komi V3.0-IA Assistant Africain. Un ɖo gbesisɔ mɛ bo na dɔn alɔ nu we."); // CHANGEMENT 4
  } else {
    parlerVoix("Bonjour, je suis Komi V3.0-IA Assistant Africain. Prêt à vous aider."); // CHANGEMENT 4
  }
}

function changerLangue() {
  configurerReconnaissanceVocale();
  saluer();
}

function parlerVoix(texte) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(texte);
    msg.lang = "fr-FR";
    msg.rate = parseFloat(document.getElementById("vitesse").value) || 1;
    msg.pitch = parseFloat(document.getElementById("tonalite").value) || 1.1;
    speechSynthesis.speak(msg);
  }
}

function configurerReconnaissanceVocale() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("micBtn").style.display = "none";
    return;
  }
  reconnaissance = new SpeechRecognition();
  const langueSaisie = document.getElementById("langue").value;
  reconnaissance.lang = (langueSaisie === "fon")? "fr-BJ" : "fr-FR";
  reconnaissance.continuous = false;
  reconnaissance.interimResults = false;

  reconnaissance.onresult = function(event) {
    const texteRecu = event.results[0][0].transcript;
    document.getElementById("texte").value = texteRecu;
    arreterMicro();
    envoyerMessage();
  };
  reconnaissance.onerror = function() { arreterMicro(); };
  reconnaissance.onend = function() { arreterMicro(); };
}

function actionMicro() {
  if (!reconnaissance) return;
  if (!enEcoute) {
    reconnaissance.start();
    enEcoute = true;
    document.getElementById("micBtn").classList.add("listening");
  } else {
    reconnaissance.stop();
  }
}

function arreterMicro() {
  enEcoute = false;
  document.getElementById("micBtn").classList.remove("listening");
}

async function envoyerMessage() {
  const champTexte = document.getElementById("texte");
  const messageUtilisateur = champTexte.value.trim();
  if (!messageUtilisateur) return;

  const langueSaisie = document.getElementById("langue").value;
  champTexte.value = "";
  ajouterAuChat("Vous", messageUtilisateur);

  if (OPENAI_API_KEY === "VOTRE_CLE_API_OPENAI") {
    const repSimulation = (langueSaisie === "fon")
   ? "Mode démo : Sɔ API key we d'o mɛ bo na mɔ gbeta jɔ jɔ."
      : "Mode démo : Connectez votre clé API OpenAI pour obtenir une vraie réponse.";
    ajouterAuChat("Komi", repSimulation); // CHANGEMENT 5
    parlerVoix(repSimulation);
    return;
  }

  const texteReflexion = (langueSaisie === "fon")? "Un ɖo tamɛ dɔn wɛ..." : "En train de réfléchir...";
  ajouterAuChat("Komi", texteReflexion); // CHANGEMENT 5

  let systemPrompt = "Tu es Komi V3.0-IA Assistant Africain, une assistante vocale concise et chaleureuse du Bénin. Tu aides pour la traduction, Pi Network, business et culture africaine.";
  if (langueSaisie === "fon") {
    systemPrompt = "Tu es Komi V3.0-IA Assistant Africain du Bénin. Tu dois répondre EXCLUSIVEMENT en langue Fon (Fongbe). Fais des phrases courtes, simples et utilise l'alphabet officiel du Fon.";
  }

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: messageUtilisateur }
        ],
        max_tokens: 200
      })
    });

    const data = await response.json();
    const messageIA = data.choices[0].message.content.trim();

    mettreAJourDernierMessage("Komi", messageIA); // CHANGEMENT 5
    parlerVoix(messageIA);

  } catch (error) {
    const texteErreur = (langueSaisie === "fon")? "Afɔku ɖe jɛ d'o azɔwanu ɔ mɛ." : "Erreur de connexion à l'IA.";
    mettreAJourDernierMessage("Komi", texteErreur); // CHANGEMENT 5
  }
}

function ajouterAuChat(auteur, texte) {
  const divReponse = document.getElementById("reponse");
  const p = document.createElement("p");
  p.style.margin = "5px 0";
  p.innerText = `${auteur} : ${texte}`;
  divReponse.appendChild(p);
  divReponse.scrollTop = divReponse.scrollHeight;
  let historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
  historique.push({ auteur, texte });
  localStorage.setItem("komi_chat", JSON.stringify(historique));
}

function mettreAJourDernierMessage(auteur, texte) {
  const divReponse = document.getElementById("reponse");
  if (divReponse.lastChild) {
    divReponse.lastChild.innerText = `${auteur} : ${texte}`;
    let historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
    if(historique.length > 0) {
      historique[historique.length - 1] = { auteur, texte };
      localStorage.setItem("komi_chat", JSON.stringify(historique));
    }
  }
}

function chargerHistorique() {
  const historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
  const divReponse = document.getElementById("reponse");
  divReponse.innerHTML = "";
  historique.forEach(msg => {
    const p = document.createElement("p");
    p.style.margin = "5px 0";
    p.innerText = `${msg.auteur} : ${msg.texte}`;
    divReponse.appendChild(p);
  });
  divReponse.scrollTop = divReponse.scrollHeight;
}

function effacerHistorique() {
  localStorage.removeItem("komi_chat");
  document.getElementById("reponse").innerHTML = "";
}
</script>
</body>
</html>
