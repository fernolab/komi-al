<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komi V3.0 - IA Vocale</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-color: #1e293b;
    --text-color: #f8fafc;
    --primary-color: #38bdf8;
    --primary-hover: #0ea5e9;
    --accent-color: #ec4899;
  }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 20px;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .chat-container {
    width: 90%;
    max-width: 500px;
    background: var(--card-color);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }
  h2 { margin-top: 0; color: var(--primary-color); }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 15px;
    font-size: 14px;
  }
  .controls label { display: flex; flex-direction: column; gap: 5px; }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
  }
  input {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #fff;
    font-size: 16px;
  }
  input:focus { outline: 2px solid var(--primary-color); }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: var(--primary-color);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  button:hover { background: var(--primary-hover); }
  button.mic-btn { background: var(--accent-color); }
  button.mic-btn.listening { animation: pulse 1.5s infinite; }
  #reponse {
    margin-top: 20px;
    padding: 15px;
    background: #0f172a;
    border-radius: 8px;
    min-height: 50px;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.5;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="chat-container">
  <h2>Komi V3.0 - IA</h2>
  
  <!-- Réglages Voix -->
  <div class="controls">
    <label>Vitesse: <input type="range" id="vitesse" min="0.5" max="2" value="1" step="0.1" style="width:100px; margin:0;"></label>
    <label>Tonalité: <input type="range" id="tonalite" min="0.5" max="2" value="1.1" step="0.1" style="width:100px; margin:0;"></label>
  </div>

  <!-- Saisie et Actions -->
  <div class="input-group">
    <input type="text" id="texte" placeholder="Discuter avec Komi...">
    <button class="mic-btn" id="micBtn" onclick="actionMicro()">🎤</button>
    <button onclick="envoyerMessage()">Envoyer</button>
  </div>

  <!-- Historique / Réponses -->
  <div id="reponse"></div>
  <button onclick="effacerHistorique()" style="background:#475569; font-size:12px; padding:6px 12px; margin-top:10px;">Effacer l'historique</button>
</div>

<script>
// Clé API OpenAI (À remplacer par votre vraie clé en production sécurisée)
const OPENAI_API_KEY = "VOTRE_CLE_API_OPENAI"; 

let reconnaissance;
let enEcoute = false;

window.onload = function() {
  chargerHistorique();
  configurerReconnaissanceVocale();
  parlerVoix("Bonjour, je suis Komi. Prête à vous aider.");
};

// 1. Synthèse Vocale (Voix, Vitesse, Tonalité)
function parlerVoix(texte) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel(); // Arrête la lecture en cours
    const msg = new SpeechSynthesisUtterance(texte);
    msg.lang = "fr-FR";
    
    // Récupération des réglages dynamiques
    msg.rate = parseFloat(document.getElementById("vitesse").value) || 1;
    msg.pitch = parseFloat(document.getElementById("tonalite").value) || 1.1; 
    
    speechSynthesis.speak(msg);
  }
}

// 2. Reconnaissance Vocale (Micro)
function configurerReconnaissanceVocale() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("micBtn").style.display = "none";
    return;
  }
  reconnaissance = new SpeechRecognition();
  reconnaissance.lang = "fr-FR";
  reconnaissance.continuous = false;
  reconnaissance.interimResults = false;

  reconnaissance.onresult = function(event) {
    const texteRecu = event.results[0][0].transcript;
    document.getElementById("texte").value = texteRecu;
    arreterMicro();
    envoyerMessage();
  };

  reconnaissance.onerror = function() { arreterMicro(); };
  reconnaissance.onend = function() { arreterMicro(); };
}

function actionMicro() {
  if (!reconnaissance) return;
  if (!enEcoute) {
    reconnaissance.start();
    enEcoute = true;
    document.getElementById("micBtn").classList.add("listening");
  } else {
    reconnaissance.stop();
  }
}

function arreterMicro() {
  enEcoute = false;
  document.getElementById("micBtn").classList.remove("listening");
}

// 3. Gestion de l'Envoi et Appel API OpenAI
async function envoyerMessage() {
  const champTexte = document.getElementById("texte");
  const messageUtilisateur = champTexte.value.trim();
  if (!messageUtilisateur) return;

  champTexte.value = "";
  ajouterAuChat("Vous", messageUtilisateur);

  if (OPENAI_API_KEY === "VOTRE_CLE_API_OPENAI") {
    const repSimulation = "Mode démo : Connectez votre clé API OpenAI pour obtenir une vraie réponse.";
    ajouterAuChat("Komi", repSimulation);
    parlerVoix(repSimulation);
    return;
  }

  ajouterAuChat("Komi", "En train de réfléchir...");

  try {
    const response = await fetch("https://openai.com", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o-mini", // Modèle rapide et économique
        messages: [
          { role: "system", content: "Tu es Komi, une assistante vocale française concise et chaleureuse." },
          { role: "user", content: messageUtilisateur }
        ],
        max_tokens: 150
      })
    });

    const data = await response.json();
    const messageIA = data.choices[0].message.content.trim();
    
    // Remplacer le message de chargement par la vraie réponse
    mettreAJourDernierMessage("Komi", messageIA);
    parlerVoix(messageIA);

  } catch (error) {
    mettreAJourDernierMessage("Komi", "Erreur de connexion à l'IA.");
  }
}

// 4. Base de données Locale (localStorage)
function ajouterAuChat(auteur, texte) {
  const divReponse = document.getElementById("reponse");
  const p = document.createElement("p");
  p.style.margin = "5px 0";
  // Utilisation stricte de innerText pour bloquer les failles XSS
  p.innerText = `${auteur} : ${texte}`; 
  divReponse.appendChild(p);
  divReponse.scrollTop = divReponse.scrollHeight;

  // Sauvegarde
  let historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
  historique.push({ auteur, texte });
  localStorage.setItem("komi_chat", JSON.stringify(historique));
}

function mettreAJourDernierMessage(auteur, texte) {
  const divReponse = document.getElementById("reponse");
  if (divReponse.lastChild) {
    divReponse.lastChild.innerText = `${auteur} : ${texte}`;
    
    let historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
    if(historique.length > 0) {
      historique[historique.length - 1] = { auteur, texte };
      localStorage.setItem("komi_chat", JSON.stringify(historique));
    }
  }
}

function chargerHistorique() {
  const historique = JSON.parse(localStorage.getItem("komi_chat")) || [];
  const divReponse = document.getElementById("reponse");
  divReponse.innerHTML = "";
  historique.forEach(msg => {
    const p = document.createElement("p");
    p.style.margin = "5px 0";
    p.innerText = `${msg.auteur} : ${msg.texte}`;
    divReponse.appendChild(p);
  });
  divReponse.scrollTop = divReponse.scrollHeight;
}

function effacerHistorique() {
  localStorage.removeItem("komi_chat");
  document.getElementById("reponse").innerHTML = "";
}
</script>
</body>
</html>
